name: Sync giscus discussions

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**'

permissions:
  contents: read
  discussions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run sync-discussions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
