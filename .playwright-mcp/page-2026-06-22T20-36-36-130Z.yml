      - heading "On Reading for Writers" [level=1] [ref=e32]
      - generic [ref=e33]: ~~~
      - generic [ref=e34]: "Writers are readers. This is a cliché because it's true. But most writers don't read the way they should. ## Reading vs. Studying There's a difference between reading for pleasure and reading as a writer. **Reading for pleasure** is about the experience. You're along for the ride. **Reading as a writer** is about the craft. You're paying attention to how the author builds the ride. Both are valid. Both are necessary. But they require different modes of attention. ## What to Look For When I read as a writer, I pay attention to: 1. **Structure** — How does the author organize their ideas? 2. **Pacing** — Where do they speed up? Slow down? 3. **Word choice** — What words carry weight? What gets trimmed? 4. **Transitions** — How do they move between ideas? 5. **Voice** — What makes this writer sound like themselves? You don't need to analyze every sentence. Just notice the patterns. ## Reading Widely The best writers read outside their comfort zone. If you only read what you already enjoy, your voice will sound like everyone else's. Read things you disagree with. Read things written for a different audience. Read things in different formats — essays, letters, manuals, dialogues. ## The Output Matters Reading without writing is consumption. Writing without reading is repetition. The feedback loop between the two is where growth happens. Read widely. Write specifically. Repeat."
